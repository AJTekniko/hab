<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/AJTekniko/ajtekniko/main/pics/profile-pic.png">
    <title>Have a Blast!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff6b00;
            color: #ff6b00;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: rgba(255, 107, 0, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ff6b00;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #ff6b00;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
        }

        .game-area {
            flex: 1;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1a3f 50%, #2d5a3d 80%);
            border: 3px solid #ff6b00;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .space-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .meteor {
            position: absolute;
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-align: center;
            padding: 5px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            border: 2px solid transparent;
        }

        .meteor.active {
            filter: drop-shadow(0 0 15px #ffff00);
        }

        .word-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px;
            border-radius: 3px;
        }

        .language1 {
            color: #00ff88;
            font-size: 1.1em;
            font-weight: bold;
        }

        .language2 {
            color: #ffaaaa;
            font-size: 0.7em;
            opacity: 0.75;
        }

        .remaining {
            color: #ffcccc;
            font-size: 0.8em;
        }

        .earth-container {
            width: 100%;
            height: 4vh;
            position: relative;
            margin-top: auto;
        }

        .earth {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 35%, #4a90e2, #1a5f9f);
            border-radius: 0;
            position: relative;
            box-shadow: 0 -5px 30px #4a90e2, inset -5px -5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: #fff;
        }

        .earth::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(34, 139, 34, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(34, 139, 34, 0.3) 0%, transparent 50%);
            border-radius: 0;
        }

        .explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            pointer-events: none;
        }

        .explosion-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff6b00;
            border-radius: 50%;
            animation: particleExplosion 0.6s ease-out forwards;
        }

        @keyframes particleExplosion {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            background: rgba(255, 107, 0, 0.1);
            border: 2px solid #ff6b00;
            border-radius: 5px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            background: rgba(255, 107, 0, 0.2);
            box-shadow: 0 0 20px #ff6b00;
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #ff6b00 0%, #ff4500 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff6b00;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.98);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #ff2000;
            text-align: center;
            z-index: 100;
            min-width: 350px;
            box-shadow: 0 0 50px #ff6b00;
            max-height: 90vh;
            overflow-y: auto;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ff2000;
        }

        .game-over .score {
            color: #ff6b00;
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
        }

        .stats {
            text-align: left;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 107, 0, 0.1);
            border-radius: 5px;
            border: 1px solid #ff6b00;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 1.1em;
        }

        .stats-divider {
            border-top: 1px solid #ff6b00;
            margin: 15px 0;
        }

        .high-score-section {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            border-radius: 5px;
        }

        .high-score-section h3 {
            color: #ffd700;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .high-score-section .stats-row {
            color: #ffd700;
        }

        .controls {
            text-align: center;
            margin-top: 20px;
        }

        .controls button {
            margin-right: 10px;
        }

        .level-up {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            color: #ff6b00;
            text-shadow: 0 0 20px #ff6b00;
            pointer-events: none;
            animation: levelUpAnimation 2s ease-out forwards;
            z-index: 50;
        }

        @keyframes levelUpAnimation {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
            }
        }

        .damage-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            animation: damageFlash 0.3s ease-out forwards;
            z-index: 75;
        }

        @keyframes damageFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .music-toggle {
            position: absolute;
            bottom: -2px;
            right: 0px;
            background: rgba(255, 107, 0, 0);
            border: 2px solid #ff6b00;
            color: #ff6b00;
            padding: 3px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 20;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .music-toggle:hover {
            background: rgba(255, 107, 0, 0.5);
            box-shadow: 0 0 15px #ff6b00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌎 Have a Blast!</h1>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">Score</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Level</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">Accuracy</div>
                <div class="info-value" id="accuracy">0%</div>
            </div>
            <div class="info-item">
                <div class="info-label">Meteors Destroyed</div>
                <div class="info-value" id="destroyed">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="space-area" id="spaceArea"></div>
            <div class="earth-container">
                <div class="earth">🌎</div>
                <button class="music-toggle" id="musicToggle">🔊 Music ON</button>
            </div>
            <div class="game-over" id="gameOver">
                <h2>GAME OVER!</h2>
                <div class="score" id="finalScore">0</div>
                <div class="stats">
                    <div class="stats-row">
                        <span>Final Level:</span>
                        <span id="statsFinalLevel">1</span>
                    </div>
                    <div class="stats-row">
                        <span>Meteors Destroyed:</span>
                        <span id="statsDestroyed">0</span>
                    </div>
                    <div class="stats-row">
                        <span>Accuracy:</span>
                        <span id="statsAccuracy">0%</span>
                    </div>
                    <div class="stats-divider"></div>
                    <div class="high-score-section">
                        <h3>⭐ Your High Score ⭐</h3>
                        <div class="stats-row">
                            <span>Score:</span>
                            <span id="statsHighScore">0</span>
                        </div>
                        <div class="stats-row">
                            <span>Meteors Destroyed:</span>
                            <span id="statsHighScoreMeteors">0</span>
                        </div>
                    </div>
                </div>
                <div class="controls">
                    <button onclick="location.reload()">Play Again</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Type the words to destroy meteors..." autocomplete="off">
            <button id="startBtn" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <script>
        const GITHUB_ASSETS_URL = 'https://raw.githubusercontent.com/AJTekniko/typing-game-assets/main/';

        const wordPairs = [
            { language1: 'padiux', language2: 'hola' },
            { language1: "xna'a", language2: 'mi mamá' },
            { language1: 'iza', language2: 'año' },
            { language1: 'xkalenu', language2: 'gracias' },
            { language1: 'neda', language2: 'yo' },
            { language1: 'waka', language2: 'sí' },
            { language1: 'txupa', language2: 'dos' },
            { language1: 'tu', language2: 'uno' },
            { language1: 'tsuna', language2: 'tres' },
            { language1: 'tapa', language2: 'cuatro' },
            { language1: 'gayu', language2: 'cinco' },
            { language1: 'tu txikitxi', language2: 'blanco' },
            { language1: 'tu miw', language2: 'azul (maíz)' },
            { language1: 'tu gutxi', language2: 'gris' },
            { language1: 'dë', language2: 'ceniza' },
            { language1: "tu ya'a", language2: 'verde' },
            { language1: 'tu gasaj', language2: 'negro' },
            { language1: 'tu xna', language2: 'rojo' },
            { language1: 'tu gatxi', language2: 'anaranjado' },
            { language1: 'tu gulaj', language2: 'amarillo' },
            { language1: 'gii', language2: 'fuego, electricidad' },
            { language1: "yu'u", language2: 'casa' },
            { language1: 'binii', language2: 'luz, brillo' },
            { language1: 'lari', language2: 'ropa' },
            { language1: 'yaga', language2: 'arbol' },
            { language1: 'giaj', language2: 'flor' },
            { language1: 'bëku', language2: 'perro' },
            { language1: 'xhwaa', language2: 'maíz' },
            { language1: 'tu yu', language2: 'color café' },
            { language1: 'yu', language2: 'tierra' }
        ];

        let gameRunning = false;
        let score = 0;
        let level = 1;
        let totalWordsTyped = 0;
        let totalCharsTyped = 0;
        let totalCorrectChars = 0;
        let meteorsDestroyed = 0;
        let activeMeteor = null;
        let meteorList = [];
        let meteorIdCounter = 0;
        let musicEnabled = true;
        let backgroundMusicAudio = null;
        let audioContext = null;
        let highScore = parseInt(localStorage.getItem('highScore')) || 0;
        let highScoreMeteors = parseInt(localStorage.getItem('highScoreMeteors')) || 0;
        
        // Word pool management
        let availableWords = [];
        let usedWords = [];

        const input = document.getElementById('input');
        const spaceArea = document.getElementById('spaceArea');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const accuracyDisplay = document.getElementById('accuracy');
        const destroyedDisplay = document.getElementById('destroyed');
        const gameOverScreen = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const musicToggle = document.getElementById('musicToggle');

        // Initialize word pools
        function initializeWordPools() {
            availableWords = [...wordPairs];
            usedWords = [];
        }

        // Get next word, cycling through all words before repeating
        function getNextWord() {
            // If all words have been used, reset the cycle
            if (availableWords.length === 0) {
                availableWords = [...usedWords];
                usedWords = [];
            }

            // Get a random word from available words
            const randomIndex = Math.floor(Math.random() * availableWords.length);
            const word = availableWords[randomIndex];

            // Move word from available to used
            availableWords.splice(randomIndex, 1);
            usedWords.push(word);

            return word;
        }

        // Normalize text by removing accents and normalizing apostrophes
        function normalizeText(text) {
            // Normalize accents using NFD decomposition
            let normalized = text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            
            // Normalize all apostrophe variants to a standard apostrophe
            normalized = normalized.replace(/[''´`‘]/g, "'");
            
            return normalized;
        }

        // Initialize audio context for sound effects
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Play background music from repository
        function playBackgroundMusic() {
            try {
                if (!backgroundMusicAudio) {
                    backgroundMusicAudio = new Audio(GITHUB_ASSETS_URL + 'bg-music.mp3');
                    backgroundMusicAudio.loop = true;
                    backgroundMusicAudio.volume = 0.3;
                }
                if (musicEnabled && gameRunning) {
                    backgroundMusicAudio.play().catch(e => console.log('Music play error:', e));
                }
            } catch (e) {
                console.log('Audio not available');
            }
        }

        // Stop background music
        function stopBackgroundMusic() {
            try {
                if (backgroundMusicAudio) {
                    backgroundMusicAudio.pause();
                    backgroundMusicAudio.currentTime = 0;
                }
            } catch (e) {
                console.log('Error stopping music');
            }
        }

        // Play word pronunciation
        function playWordAudio(word) {
            try {
                const audio = new Audio(GITHUB_ASSETS_URL + 'xi/' + word + '.ogg');
                audio.volume = 0.8;
                audio.play().catch(e => console.log('Word audio play error:', e));
            } catch (e) {
                console.log('Audio not available');
            }
        }

        // Play boom sound when meteor hits earth
        function playBoomSound() {
            try {
                const audio = new Audio(GITHUB_ASSETS_URL + 'boom.ogg');
                audio.volume = 0.5;
                audio.play().catch(e => console.log('Boom audio play error:', e));
            } catch (e) {
                console.log('Audio not available');
            }
        }

        function playBuzzer() {
            try {
                if (!audioContext) initAudioContext();
                
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = 150;
                osc.type = 'square';
                
                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.log('Audio not available');
            }
        }

        function playExplosion() {
            try {
                if (!audioContext) initAudioContext();
                
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                
                osc.start(now);
                osc.stop(now + 0.3);
            } catch (e) {
                console.log('Audio not available');
            }
        }

        function getSpeedForLevel(level) {
            return 1 + (level - 1) * 0.5;
        }

        function startGame() {
            if (gameRunning) return;

            gameRunning = true;
            score = 0;
            level = 1;
            totalWordsTyped = 0;
            totalCharsTyped = 0;
            totalCorrectChars = 0;
            meteorsDestroyed = 0;
            meteorList = [];
            meteorIdCounter = 0;
            activeMeteor = null;
            gameOverScreen.classList.remove('show');

            // Initialize word pools for this game
            initializeWordPools();

            input.value = '';
            input.focus();
            input.disabled = false;
            spaceArea.innerHTML = '';
            startBtn.disabled = true;

            if (musicEnabled) {
                playBackgroundMusic();
            }

            spawnMeteor();

            const spawnInterval = setInterval(() => {
                if (gameRunning && meteorList.length < 3) {
                    spawnMeteor();
                }
                if (!gameRunning) {
                    clearInterval(spawnInterval);
                }
            }, 2000);

            const gameLoop = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(gameLoop);
                    return;
                }
                updateMeteors();
            }, 30);
        }

        function spawnMeteor() {
            const wordPair = getNextWord();
            const meteorElement = document.createElement('div');
            meteorElement.className = 'meteor';
            meteorElement.id = `meteor-${meteorIdCounter}`;
            meteorElement.style.backgroundImage = `url('${GITHUB_ASSETS_URL}meteor.png')`;

            const meteor = {
                id: meteorIdCounter++,
                element: meteorElement,
                language1: wordPair.language1,
                language2: wordPair.language2,
                typed: '',
                y: -80,
                x: Math.random() * (spaceArea.clientWidth - 80),
                active: false,
                speed: getSpeedForLevel(level)
            };

            updateMeteorDisplay(meteor);
            meteorList.push(meteor);
            spaceArea.appendChild(meteorElement);

            if (!activeMeteor) {
                setActiveMeteor(meteor);
            }
        }

        function updateMeteorDisplay(meteor) {
            const typed = meteor.typed;
            const remaining = meteor.language1.slice(typed.length);

            meteor.element.innerHTML = `
                <div class="word-text">
                    <div class="language1">${escapeHtml(typed)}<span class="remaining">${escapeHtml(remaining)}</span></div>
                    <div class="language2">${escapeHtml(meteor.language2)}</div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setActiveMeteor(meteor) {
            if (activeMeteor && activeMeteor.element) {
                activeMeteor.element.classList.remove('active');
            }
            activeMeteor = meteor;
            if (activeMeteor) {
                activeMeteor.element.classList.add('active');
            }
            updateMeteorDisplay(activeMeteor);
        }

        function updateMeteors() {
            meteorList.forEach(meteor => {
                meteor.y += meteor.speed;
                meteor.element.style.top = meteor.y + 'px';
                meteor.element.style.left = meteor.x + 'px';

                if (meteor.y > spaceArea.clientHeight - 80) {
                    endGame();
                }
            });
        }

        input.addEventListener('input', (e) => {
            if (!gameRunning || !activeMeteor) return;

            initAudioContext();

            const inputValue = input.value.toLowerCase().trim();

            if (inputValue.length === 0) {
                activeMeteor.typed = '';
                updateMeteorDisplay(activeMeteor);
                return;
            }

            // Normalize both input and the target word for comparison
            const normalizedInput = normalizeText(inputValue);
            const normalizedLanguage1 = normalizeText(activeMeteor.language1.toLowerCase());

            const lastChar = inputValue[inputValue.length - 1];
            const normalizedLastChar = normalizeText(lastChar);
            const normalizedTargetChar = normalizeText(activeMeteor.language1[inputValue.length - 1].toLowerCase());

            // Check if the last character matches
            if (normalizedLastChar !== normalizedTargetChar) {
                input.value = inputValue.slice(0, -1);
                playBuzzer();
                totalCharsTyped++;
                return;
            }

            // Check if input matches the start of the word
            if (!normalizedLanguage1.startsWith(normalizedInput)) {
                input.value = inputValue.slice(0, -1);
                playBuzzer();
                totalCharsTyped++;
                return;
            }

            activeMeteor.typed = inputValue;
            totalCharsTyped++;
            totalCorrectChars++;
            updateMeteorDisplay(activeMeteor);

            // Check if word is complete
            if (normalizedInput === normalizedLanguage1) {
                destroyMeteor(activeMeteor);
            }

            updateStats();
        });

        function destroyMeteor(meteor) {
            playExplosion();
            playWordAudio(meteor.language1);
            totalWordsTyped++;
            score += meteor.language1.length * (10 * level);
            meteorsDestroyed++;

            createExplosion(meteor);

            meteorList = meteorList.filter(m => m !== meteor);
            spaceArea.removeChild(meteor.element);

            input.value = '';

            if (meteorList.length > 0) {
                setActiveMeteor(meteorList[0]);
            } else {
                activeMeteor = null;
            }

            if (meteorsDestroyed % 3 === 0) {
                levelUp();
            }

            updateStats();
        }

        function createExplosion(meteor) {
            const explosion = document.createElement('div');
            explosion.className = 'explosion';
            explosion.style.top = meteor.y + 'px';
            explosion.style.left = meteor.x + 'px';

            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'explosion-particle';

                const angle = (i / 12) * Math.PI * 2;
                const distance = 40;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.left = '40px';
                particle.style.top = '40px';

                explosion.appendChild(particle);
            }

            spaceArea.appendChild(explosion);

            setTimeout(() => {
                spaceArea.removeChild(explosion);
            }, 600);
        }

        function levelUp() {
            level++;
            
            meteorList.forEach(meteor => {
                meteor.speed = getSpeedForLevel(level);
            });

            const levelUpDisplay = document.createElement('div');
            levelUpDisplay.className = 'level-up';
            levelUpDisplay.textContent = `LEVEL ${level}!`;
            document.body.appendChild(levelUpDisplay);

            setTimeout(() => {
                document.body.removeChild(levelUpDisplay);
            }, 2000);

            updateStats();
        }

        function updateStats() {
            scoreDisplay.textContent = Math.floor(score);
            levelDisplay.textContent = level;
            destroyedDisplay.textContent = meteorsDestroyed;

            const accuracy = totalCharsTyped > 0 
                ? Math.round((totalCorrectChars / totalCharsTyped) * 100) 
                : 0;
            accuracyDisplay.textContent = accuracy + '%';
        }

        function endGame() {
            gameRunning = false;
            stopBackgroundMusic();
            playBoomSound();
            input.disabled = true;
            startBtn.disabled = false;

            const accuracy = totalCharsTyped > 0 
                ? Math.round((totalCorrectChars / totalCharsTyped) * 100) 
                : 0;

            // Check if this is a new high score
            const finalScore = Math.floor(score);
            if (finalScore > highScore) {
                highScore = finalScore;
                highScoreMeteors = meteorsDestroyed;
                localStorage.setItem('highScore', highScore);
                localStorage.setItem('highScoreMeteors', highScoreMeteors);
            }

            document.getElementById('finalScore').textContent = finalScore;
            document.getElementById('statsFinalLevel').textContent = level;
            document.getElementById('statsDestroyed').textContent = meteorsDestroyed;
            document.getElementById('statsAccuracy').textContent = accuracy + '%';
            
            document.getElementById('statsHighScore').textContent = highScore;
            document.getElementById('statsHighScoreMeteors').textContent = highScoreMeteors;

            const damageScreen = document.createElement('div');
            damageScreen.className = 'damage-screen';
            document.body.appendChild(damageScreen);

            setTimeout(() => {
                document.body.removeChild(damageScreen);
            }, 300);

            gameOverScreen.classList.add('show');
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !gameRunning) {
                startGame();
            }
        });

        // Music toggle
        musicToggle.addEventListener('click', () => {
            musicEnabled = !musicEnabled;
            musicToggle.textContent = musicEnabled ? '🔊 Music ON' : '🔇 Music OFF';
            
            if (gameRunning) {
                if (musicEnabled) {
                    playBackgroundMusic();
                } else {
                    stopBackgroundMusic();
                }
            }
        });
    </script>
</body>
</html>
